<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Identificador de Tipos</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body{
            background: #f2f2f2;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            width: 400px;
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
        }

        h1{
            text-align: center;
            margin-bottom: 20px;
            color: #333;
        }

        input{
            width: 100%;
            padding: 12px;
            border: 1px solid #ccc;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 16px;
        }

        button{
            width: 100%;
            padding: 12px;
            border: none;
            background: #007bff;
            color: white;
            font-size: 16px;
            border-radius: 5px;
            cursor: pointer;
        }

        button:hover{
            background: #0056b3;
        }

        #resultado{
            margin-top: 20px;
            padding: 15px;
            background: #f8f8f8;
            border-radius: 5px;
            font-size: 18px;
            line-height: 30px;
        }

        .tipo{
            color: #007bff;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div class="container">

        <h1>Identificador de Tipos</h1>

        <input 
            type="text" 
            id="valor" 
            placeholder="Digite um valor"
        >

        <button onclick="identificarTipo()">
            Verificar Tipo
        </button>

        <div id="resultado">

            Resultado aparecerá aqui...

        </div>

    </div>

    <script>

        function identificarTipo(){

            let valor = document.getElementById("valor").value;

            let tipo;

            // NUMBER
            if(valor !== "" && !isNaN(valor)){
                tipo = typeof Number(valor);
            }

            // BOOLEAN
            else if(
                valor.toLowerCase() === "true" ||
                valor.toLowerCase() === "false"
            ){
                tipo = typeof true;
            }

            // UNDEFINED
            else if(valor.toLowerCase() === "undefined"){
                tipo = "undefined";
            }

            // NULL
            else if(valor.toLowerCase() === "null"){
                tipo = "null";
            }

            // ARRAY
            else if(valor.startsWith("[") && valor.endsWith("]")){
                tipo = "array";
            }

            // OBJECT
            else if(valor.startsWith("{") && valor.endsWith("}")){
                tipo = "object";
            }

            // FUNCTION
            else if(valor.includes("function")){
                tipo = "function";
            }

            // BIGINT
            else if(valor.endsWith("n") && !isNaN(valor.slice(0, -1))){
                tipo = "bigint";
            }

            // STRING
            else{
                tipo = "string";
            }

            document.getElementById("resultado").innerHTML = `
                <p><strong>Valor:</strong> ${valor}</p>
                <p><strong>Tipo:</strong> 
                <span class="tipo">${tipo}</span></p>
            `;
        }

    </script>

</body>
</html>
