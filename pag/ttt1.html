<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro - Sistema de Avaliação</title>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #f1f5f9;
    }

    .header {
      position: sticky;
      top: 0;
      background: #3e68ca;
      padding: 15px 25px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      z-index: 1000;
    }

    .header h1 a {
      color: #fff;
      text-decoration: none;
      font-size: 20px;
    }

    .menu-toggle {
      display: none;
      font-size: 26px;
      background: none;
      border: none;
      color: #fff;
      cursor: pointer;
    }

    nav {
      display: flex;
      gap: 10px;
    }

    nav a {
      text-decoration: none;
      padding: 8px 16px;
      background: #1e293b;
      color: #fff;
      border-radius: 6px;
      font-weight: bold;
      transition: 0.3s;
    }

    nav a:hover {
      background: #3e68ca;
      color: #000;
    }

    main {
      display: flex;
      justify-content: center;
      padding: 50px 20px;
    }

    .card {
      background: #fff;
      max-width: 550px;
      width: 100%;
      padding: 35px;
      border-radius: 12px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    .card h2 {
      color: #1e293b;
      text-align: center;
      margin-bottom: 10px;
    }

    .subtitulo {
      text-align: center;
      color: #475569;
      margin-bottom: 25px;
      font-size: 14px;
    }

    .info-notas {
      background: #e2e8f0;
      padding: 12px;
      border-radius: 8px;
      margin-bottom: 25px;
      font-size: 13px;
      text-align: center;
      border-left: 4px solid #3e68ca;
    }

    .info-notas strong {
      color: #3e68ca;
    }

    .campo {
      margin-bottom: 18px;
    }

    label {
      display: block;
      margin-bottom: 6px;
      font-weight: bold;
      color: #1e293b;
    }

    input {
      width: 100%;
      padding: 10px;
      border: 1px solid #cbd5e1;
      border-radius: 6px;
      font-size: 14px;
    }

    input:focus {
      outline: none;
      border-color: #3e68ca;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #3e68ca;
      border: none;
      border-radius: 6px;
      color: #fff;
      font-weight: bold;
      font-size: 16px;
      cursor: pointer;
      transition: 0.3s;
      margin-top: 10px;
    }

    .btn:hover {
      background: #1e293b;
    }

    .navegacao {
      display: flex;
      gap: 15px;
      margin-top: 25px;
    }

    .nav-link {
      flex: 1;
      text-align: center;
      padding: 10px;
      background: #e2e8f0;
      border-radius: 6px;
      text-decoration: none;
      color: #1e293b;
      font-weight: bold;
      transition: 0.3s;
    }

    .nav-link:hover {
      background: #3e68ca;
      color: #fff;
    }

    @media (max-width: 768px) {
      .menu-toggle { display: block; }
      nav { display: none; flex-direction: column; width: 100%; margin-top: 15px; }
      nav.active { display: flex; }
      .header { flex-direction: column; align-items: flex-start; }
      .card { padding: 25px; }
      .navegacao { flex-direction: column; }
    }
  </style>
</head>

<body>

<header class="header">
  <h1><a href="index.html">Sistema de Avaliação</a></h1>
  <button class="menu-toggle">☰</button>
  <nav id="menu">
    <a href="ttt1.html">Cadastro</a>
    <a href="ttt2.html">Lista</a>

  </nav>
</header>

<main>
  <div class="card">
    <h2>Registro de Estudante</h2>
    <div class="subtitulo">Preencha os dados abaixo</div>

  

    <form id="formEstudante">
      <div class="campo">
        <label>Nome completo</label>
        <input type="text" id="nome" required placeholder="Digite o nome">
      </div>
      <div class="campo">
        <label>Disciplina</label>
        <input type="text" id="disciplina" required placeholder="Ex: Matemática">
      </div>
      <div class="campo">
        <label>Primeiro Trimestre </label>
        <input type="number" id="nota1" step="0.1" min="0" max="20" required>
      </div>
      <div class="campo">
        <label>Segundo Trimestre </label>
        <input type="number" id="nota2" step="0.1" min="0" max="20" required>
      </div>
      <div class="campo">
        <label>Terceiro Trimestre </label>
        <input type="number" id="nota3" step="0.1" min="0" max="20" required>
      </div>
      <button type="submit" class="btn">Adicionar Estudante</button>
    </form>

    <div class="navegacao">
      <a href="ttt2.html" class="nav-link">Ver Lista</a>
    
    </div>
  </div>
</main>

<script>
  function obterEstudantes() {
    const salvo = localStorage.getItem('estudantes_sistema');
    return salvo ? JSON.parse(salvo) : [];
  }
  function salvarEstudantes(estudantes) {
    localStorage.setItem('estudantes_sistema', JSON.stringify(estudantes));
  }
  document.getElementById('formEstudante').addEventListener('submit', function(e) {
    e.preventDefault();
    const nome = document.getElementById('nome').value.trim();
    const disciplina = document.getElementById('disciplina').value.trim();
    const nota1 = parseFloat(document.getElementById('nota1').value);
    const nota2 = parseFloat(document.getElementById('nota2').value);
    const nota3 = parseFloat(document.getElementById('nota3').value);
    if (!nome || !disciplina) { alert('Preencha nome e disciplina!'); return; }
    if (isNaN(nota1) || isNaN(nota2) || isNaN(nota3)) { alert('Preencha todas as notas!'); return; }
    if (nota1<0 || nota1>20 || nota2<0 || nota2>20 || nota3<0 || nota3>20) { alert('Notas devem estar entre 0 e 20!'); return; }
    const estudantes = obterEstudantes();
    estudantes.push({ nome, disciplina, nota1, nota2, nota3 });
    salvarEstudantes(estudantes);
    this.reset();
    alert('Estudante cadastrado com sucesso!');
  });

  const toggle = document.querySelector('.menu-toggle');
  const menu = document.getElementById('menu');
  toggle.addEventListener('click', () => menu.classList.toggle('active'));
</script>

</body>
</html>
